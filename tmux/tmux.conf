# tmux Configuration — Catppuccin Mocha + Claude Code optimized
# Prefix: Ctrl+a

# ── Prefix ─────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g status-position bottom

# ── Claude Code Specific ───────────────────────────────
# Required: allow escape sequences (progress bars, notifications) to pass through
set -g allow-passthrough on

# Forward extended key sequences (Shift+Enter etc.) to applications
# Note: Fixed natively in Claude Code v2.1.83+ but kept as safety net
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# ── Pane Splitting (Nordic keyboard friendly) ──────────
# v = vertical (side-by-side), - = horizontal (top/bottom)
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane Navigation (vim-style with prefix) ───────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane Resizing (Shift + vim keys, 5-cell steps) ────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window Management ─────────────────────────────────
# Kill window remapped from & (awkward on Nordic keyboards)
bind X confirm-before -p "Kill window #W? (y/n)" kill-window

# New windows open in current directory
bind c new-window -c "#{pane_current_path}"


# ── Mouse Toggle (for drag-and-drop from Finder) ──────
# Shift+drag also works to bypass tmux mouse capture
bind m set -g mouse \; display-message "Mouse: #{?mouse,ON,OFF}"

# ── Reload Config ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ── Cheat Sheet Popup ──────────────────────────────────
bind ? display-popup -E -w 58 -h 40 "bash ~/.tmux/cheatsheet.sh"

# ── Catppuccin Theme ───────────────────────────────────
set -g @catppuccin_flavor "mocha"

# ── Window Tabs ────────────────────────────────────────
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_flags_icon_current ""
set -g @catppuccin_window_flags_icon_last ""
set -g @catppuccin_window_flags_icon_zoom " 󰁌"

# ── Plugins (TPM) ─────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# ── Load Catppuccin (must be after flavor is set) ──────
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# ── Status Bar (hand-crafted, airy) ───────────────────
set -g status-right-length 150
set -g status-left-length 100
set -g status-left ""

# Pane border styling
set -g pane-active-border-style "fg=#{@thm_lavender}"
set -g pane-border-style "fg=#{@thm_surface_0}"

# ── Right Side (airy, icon-driven) ────────────────────
set -g status-right "#[fg=#{@thm_green}]  #{b:pane_current_path}"
set -ag status-right "#[fg=#{@thm_surface_1}]  │  "
set -ag status-right "#[fg=#{@thm_blue}]󰃰 %Y-%m-%d  %H:%M "

# ── Initialize TPM (keep at very bottom) ───────────────
run '~/.tmux/plugins/tpm/tpm'

# ── Quick Pane Switching (no prefix, must be after TPM) ─
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D
