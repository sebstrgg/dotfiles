# Atuin — encrypted shell history sync
# Server: populated at install time via setup_atuin() in install.sh
# Docs: https://docs.atuin.sh/

## Sync
sync_address = "{{ATUIN_SYNC_ADDRESS}}"
auto_sync = true
sync_frequency = "5m"
update_check = false

## Search
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "session"

## UI
style = "compact"
inline_height = 20
show_preview = true
show_help = true
exit_mode = "return-original"

## History capture
history_filter = [
    "^ ",
]
cwd_filter = []
secrets_filter = true

## Dialect
dialect = "uk"
timezone = "local"

## Keybindings
enter_accept = true
