# Starship Prompt — Catppuccin Mocha, bracketed multi-line
# Docs: https://starship.rs/config/
#
# Two-line prompt framed with ╭─ / ╰─
#   ╭─  seb@seb-w11 • ~/dotfiles •  main ● 3 ○ 1            2s
#   ╰─❯
#
# Icons used:
#     U+F015  Nerd Font (Font Awesome) home — widely supported
#     U+E0A0  Powerline branch — present in every Nerd Font / Powerline font
# Git status uses plain BMP unicode (● ○ ✚ ✖ ➜ ▼ ⚠ ↑ ↓)
# so it renders in any font, no Nerd Font required.

format = """
[╭─](overlay0) [](lavender) $username[@](overlay0)$hostname [•](overlay0) $directory$git_branch$git_status$fill$cmd_duration
[╰─](overlay0)$character"""

add_newline = true
palette = "catppuccin_mocha"

[username]
show_always = true
style_user = "bold lavender"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = false
ssh_symbol = " "
style = "bold sapphire"
format = "[$ssh_symbol$hostname]($style)"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style)"
read_only = " "
read_only_style = "red"

[git_branch]
style = "yellow"
symbol = " "
truncation_length = 24
truncation_symbol = "…"
format = " [•](overlay0) [$symbol$branch]($style)"

[git_status]
style = "peach"
format = "([$all_status$ahead_behind]($style))"
conflicted = " · 💥"
up_to_date = ""
untracked = " · ❓ ${count}"
stashed = " · 📦 ${count}"
modified = " · 📝 ${count}"
staged = " · ✅ ${count}"
renamed = " · 🏷️ ${count}"
deleted = " · 🗑️ ${count}"
ahead = " · ⬆️ ${count}"
behind = " · ⬇️ ${count}"
diverged = " · 🔀 ⬆️ ${ahead_count} ⬇️ ${behind_count}"

[fill]
symbol = " "

[cmd_duration]
min_time = 2_000
style = "dimmed subtext0"
format = "[$duration]($style)"

[character]
success_symbol = "[ ❯](bold lavender)"
error_symbol = "[ ❯](bold red)"

# Disable modules we don't need
[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

